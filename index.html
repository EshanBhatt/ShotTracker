<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ShotTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0f16;--s1:#141820;--s2:#1c2030;--s3:#252840;--or:#f07030;--t:#e6e9f2;--td:#6b7592;--tdd:#323850;--bdr:#232840;--gr:#22c55e;--yw:#f59e0b;--rd:#ef4444;--bl:#60a5fa}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:'Inter',system-ui,sans-serif;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0;background:var(--s1)}
.logo{font-size:17px;font-weight:900;letter-spacing:-.6px}.logo em{color:var(--or);font-style:normal}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--td);background:var(--s2);border-radius:20px;padding:5px 10px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--tdd)}.sdot.ok{background:var(--gr)}.sdot.busy{background:var(--yw);animation:blink 1s infinite}.sdot.err{background:var(--rd)}
@keyframes blink{50%{opacity:.15}}
#vc{flex:1;overflow:hidden;position:relative;min-height:0}
.view{position:absolute;inset:0;overflow-y:auto;display:none}.view.active{display:block}
nav{display:flex;border-top:1px solid var(--bdr);background:var(--s1);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px calc(9px + env(safe-area-inset-bottom,0px));border:none;background:none;color:var(--td);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.nb svg{width:19px;height:19px}.nb.on{color:var(--or)}
.ttabs{display:flex;gap:4px;padding:10px 14px 6px}
.tt{padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:none;color:var(--td);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.tt.on{background:var(--or);border-color:var(--or);color:#fff}
.pnav{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px 4px;font-size:13px;font-weight:700}
.pb{background:none;border:none;color:var(--td);font-size:20px;padding:3px 8px;cursor:pointer;line-height:1}
.pb:disabled{opacity:.15;cursor:default}

/* ═══════════════════════════════════════════════════════
   GRID LAYOUT — HOOP AT TOP, 3PT AT BOTTOM
   
   6 cols × 4 rows:
   
   ROW 1 ▲ HOOP END:
     [paint_left ·cols1-2·][  clp(Restricted) ·cols3-4·][paint_right ·cols5-6·]

   ROW 2:
     [paint_left ·cols1-2·][  cp(Center Paint) ·cols3-4·][paint_right ·cols5-6·]

   ROW 3 — MID RANGE:
     [lc3·col1][left_mid·col2][lcm·col3][rcm·col4][right_mid·col5][rc3·col6]

   ROW 4 ▼ 3PT END:
     [lc3·col1][lw3·col2][  ct3(Top of Key) ·cols3-4·][rw3·col5][rc3·col6]

   lc3 / rc3 span rows 3-4   (corner 3s on the sides)
   paint_left / right span rows 1-2
═══════════════════════════════════════════════════════ */
.cw{padding:4px 12px 6px}
.chart-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:2fr 1.5fr 1.1fr 1.1fr;
  gap:2px;background:var(--bg);border-radius:8px;overflow:hidden;
  position:relative;width:100%;
}

/* Paint — TOP (hoop end) */
.z[data-k="lc3"]        {grid-column:1;  grid-row:1/3}
.z[data-k="lw3"]        {grid-column:2;  grid-row:1}
.z[data-k="ct3"]        {grid-column:3/5;grid-row:1}
.z[data-k="rw3"]        {grid-column:5;  grid-row:1}
.z[data-k="rc3"]        {grid-column:6;  grid-row:1/3}

/* Mid-range — ROW 2 */
.z[data-k="left_mid"]   {grid-column:2;  grid-row:2}
.z[data-k="lcm"]        {grid-column:3;  grid-row:2}
.z[data-k="rcm"]        {grid-column:4;  grid-row:2}
.z[data-k="right_mid"]  {grid-column:5;  grid-row:2}

/* Paint — BOTTOM */
.z[data-k="paint_left"] {grid-column:1/3;grid-row:3/5}
.z[data-k="cp"]         {grid-column:3/5;grid-row:3}
.z[data-k="clp"]        {grid-column:3/5;grid-row:4}
.z[data-k="paint_right"]{grid-column:5/7;grid-row:3/5}

/* Zone style */
.z{display:flex;flex-direction:column;align-items:center;justify-content:center;
   cursor:pointer;-webkit-user-select:none;user-select:none;min-width:0;overflow:hidden;transition:filter .1s}
.z:active{filter:brightness(1.3)!important}
.zpct{font-size:clamp(11px,3.5vw,17px);font-weight:800;color:#fff;line-height:1.1;text-align:center}
.zma{font-size:clamp(8px,2.3vw,11px);font-weight:500;color:rgba(255,255,255,.7);text-align:center;margin-top:2px}
.zplus{font-size:clamp(16px,5vw,24px);font-weight:300;color:rgba(255,255,255,.28)}
.court-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* ── rest of styles ── */
.srow{display:flex;gap:6px;padding:6px 14px 8px}
.sc{flex:1;background:var(--s1);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--bdr)}
.scp{font-size:20px;font-weight:800;line-height:1}.scl{font-size:10px;color:var(--td);font-weight:600;letter-spacing:.4px;margin-top:2px}.scs{font-size:10px;color:var(--tdd);margin-top:1px}
.leg{display:flex;justify-content:center;gap:10px;padding:0 14px 10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--td)}.ls{width:9px;height:9px;border-radius:2px}
.lh{padding:10px 14px 4px}.lh h2{font-size:15px;font-weight:700;margin-bottom:2px}.lh p{font-size:11px;color:var(--td)}
.ps{padding:0 14px 10px}.pt{font-size:10px;font-weight:700;color:var(--td);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.pl{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.pi{display:flex;align-items:center;padding:9px 12px;background:var(--s2);border-radius:8px;gap:8px}
.pin{font-size:13px;font-weight:600;flex:1}.pis{font-size:12px;color:var(--td)}.pip{font-size:13px;font-weight:700;width:36px;text-align:right}
.pid{background:none;border:none;color:var(--tdd);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;font-family:inherit}
.savebtn{width:100%;padding:13px;background:var(--or);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.savebtn:disabled{background:var(--s3);color:var(--td);cursor:default}
.sh{padding:12px 14px 4px}.sh h2{font-size:15px;font-weight:700}
.zlist{padding:0 14px 8px}.slbl{font-size:10px;font-weight:700;color:var(--tdd);letter-spacing:.5px;text-transform:uppercase;padding:10px 0 5px}
.zr{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);gap:8px}.zr:last-child{border-bottom:none}
.zrc{width:8px;height:8px;border-radius:50%;flex-shrink:0}.zrn{flex:1;font-size:13px;font-weight:500}
.zrm{font-size:11px;color:var(--td)}.zrp{font-size:14px;font-weight:700;width:40px;text-align:right}.zrt{font-size:10px;color:var(--tdd);width:26px;text-align:right}
.ss{padding:0 14px 24px}.sst{font-size:10px;font-weight:700;color:var(--tdd);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.si{background:var(--s1);border-radius:8px;padding:11px 13px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bdr)}
.sid{font-size:13px;font-weight:600}.sis{font-size:11px;color:var(--td);margin-top:2px}.sidel{background:none;border:none;color:var(--tdd);cursor:pointer;font-size:14px;padding:4px;font-family:inherit}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.ms{background:var(--s1);border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-width:480px;transform:translateY(100%);transition:transform .22s cubic-bezier(.32,.72,0,1)}
.mo.open .ms{transform:translateY(0)}
.mhdl{width:34px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 14px}
.mt{font-size:16px;font-weight:800;margin-bottom:3px}.msub{font-size:12px;color:var(--td);margin-bottom:18px}
.mins{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.iw label{font-size:10px;font-weight:700;color:var(--td);letter-spacing:.4px;text-transform:uppercase;display:block;margin-bottom:5px}
.iw input{width:100%;padding:13px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:10px;color:var(--t);font-size:28px;font-weight:800;text-align:center;outline:none;font-family:inherit;-webkit-appearance:none}
.iw input:focus{border-color:var(--or)}
.mbtns{display:grid;grid-template-columns:1fr 2fr;gap:8px}
.mbcan{padding:13px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;color:var(--t);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.mbadd{padding:13px;background:var(--or);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.mbadd:active{background:#a04010}
.empty{text-align:center;padding:24px 18px;color:var(--td);font-size:13px;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="logo">Shot<em>Tracker</em></div>
  <div class="sync-pill"><div id="sd" class="sdot"></div><span id="sl">—</span></div>
</header>
<div id="vc">
  <div id="v-court" class="view active">
    <div class="ttabs" id="ct">
      <button class="tt" onclick="setF('monthly',this,'ct')">Monthly</button>
      <button class="tt" onclick="setF('yearly',this,'ct')">Yearly</button>
      <button class="tt on" onclick="setF('alltime',this,'ct')">All Time</button>
    </div>
    <div class="pnav" id="cpnav" style="display:none">
      <button class="pb" id="cprev" onclick="chP(-1,'c')">‹</button>
      <span id="cplbl">—</span>
      <button class="pb" id="cnext" onclick="chP(1,'c')">›</button>
    </div>
    <div class="cw" id="cWrap"></div>
    <div class="srow" id="csum"></div>
    <div class="leg">
      <div class="li"><div class="ls" style="background:#dc4010"></div>&gt;60%</div>
      <div class="li"><div class="ls" style="background:#dd8050"></div>50–60%</div>
      <div class="li"><div class="ls" style="background:#3858a0"></div>35–50%</div>
      <div class="li"><div class="ls" style="background:#1e3490"></div>&lt;35%</div>
      <div class="li"><div class="ls" style="background:#555666"></div>No shots</div>
    </div>
  </div>
  <div id="v-log" class="view">
    <div class="lh"><h2>Log Session</h2><p>Tap zones to record shots</p></div>
    <div class="cw" id="lWrap"></div>
    <div class="ps" id="pend" style="display:none">
      <div class="pt">Session Zones</div>
      <div class="pl" id="plist"></div>
      <button class="savebtn" onclick="saveSess()">Save Session</button>
    </div>
    <div class="empty" id="lempty">Tap any zone on the court above<br>to start logging shots.</div>
  </div>
  <div id="v-stats" class="view">
    <div class="sh"><h2>Statistics</h2></div>
    <div class="ttabs" id="st">
      <button class="tt" onclick="setF('monthly',this,'st')">Monthly</button>
      <button class="tt" onclick="setF('yearly',this,'st')">Yearly</button>
      <button class="tt on" onclick="setF('alltime',this,'st')">All Time</button>
    </div>
    <div class="pnav" id="spnav" style="display:none">
      <button class="pb" id="sprev" onclick="chP(-1,'s')">‹</button>
      <span id="splbl">—</span>
      <button class="pb" id="snext" onclick="chP(1,'s')">›</button>
    </div>
    <div class="srow" id="ssum" style="padding-top:8px"></div>
    <div class="zlist" id="zlist"></div>
    <div class="ss" id="sesslist"></div>
  </div>
</div>
<nav>
  <button class="nb on" id="nb-court" onclick="sv('court')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="12" cy="7" r="2.5"/></svg>Court
  </button>
  <button class="nb" id="nb-log" onclick="sv('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Log
  </button>
  <button class="nb" id="nb-stats" onclick="sv('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 17 8 12 13 15 21 7"/></svg>Stats
  </button>
</nav>
<div class="mo" id="mo">
  <div class="ms">
    <div class="mhdl"></div>
    <div class="mt" id="mtitle"></div>
    <div class="msub">Enter makes and total attempts</div>
    <div class="mins">
      <div class="iw"><label>Makes</label><input type="number" id="im" min="0" placeholder="0" inputmode="numeric"></div>
      <div class="iw"><label>Attempts</label><input type="number" id="ia" min="0" placeholder="0" inputmode="numeric"></div>
    </div>
    <div class="mbtns">
      <button class="mbcan" onclick="closeMo()">Cancel</button>
      <button class="mbadd" onclick="addZone()">Add Zone</button>
    </div>
  </div>
</div>

<script>
const REPO='EshanBhatt/ShotTracker',FILE='data/shots.json';
const TOK=['github_pat_11ANUBPFI0WwSQtn48cDY1_6VTmomAJvGJE','gIQyTgR7vUKnqxj6TdwQrUrVBGaFSLUBGTFGPEKLrHZZVga'].join('');

// 13 zones. Names reflect basketball positions (from player's POV facing basket).
// Paint = top of chart (near hoop). 3PT = bottom of chart (far from hoop).
const ZS={
  // ▲ HOOP END — paint
  clp:        {n:'Restricted',    t:'2'},  // closest to basket, top center
  cp:         {n:'Center Paint',  t:'2'},  // FT area
  paint_left: {n:'Left Post',     t:'2'},
  paint_right:{n:'Right Post',    t:'2'},
  // MID-RANGE
  left_mid:   {n:'Left Mid',      t:'2'},
  lcm:        {n:'Left Elbow',    t:'2'},
  rcm:        {n:'Right Elbow',   t:'2'},
  right_mid:  {n:'Right Mid',     t:'2'},
  // ▼ 3PT END — behind arc
  lc3:        {n:'Left Corner 3', t:'3'},
  lw3:        {n:'Left Wing 3',   t:'3'},
  ct3:        {n:'Top of Key 3',  t:'3'},  // bottom center, wide
  rw3:        {n:'Right Wing 3',  t:'3'},
  rc3:        {n:'Right Corner 3',t:'3'},
};
const ZK=Object.keys(ZS);

// Historical data (lw3 includes merged lt3; rw3 = former rt3)
const HIST=[
  // ct3=Top of Key 3PT, clp=Restricted (near basket). Was previously swapped — now corrected.
  {id:'aug2025',date:'2025-08-01',zones:{
    clp:{makes:9,attempts:10},cp:{makes:54,attempts:115},paint_left:{makes:12,attempts:39},paint_right:{makes:20,attempts:41},
    left_mid:{makes:24,attempts:62},lcm:{makes:5,attempts:8},rcm:{makes:5,attempts:8},right_mid:{makes:35,attempts:93},
    lc3:{makes:12,attempts:22},lw3:{makes:18,attempts:28},ct3:{makes:33,attempts:96},rw3:{makes:15,attempts:33},rc3:{makes:7,attempts:13}}},
  {id:'sep2025',date:'2025-09-01',zones:{
    clp:{makes:10,attempts:18},cp:{makes:39,attempts:84},paint_left:{makes:48,attempts:97},paint_right:{makes:38,attempts:100},
    left_mid:{makes:43,attempts:117},lcm:{makes:4,attempts:8},rcm:{makes:20,attempts:33},right_mid:{makes:45,attempts:110},
    lc3:{makes:27,attempts:66},lw3:{makes:43,attempts:77},ct3:{makes:52,attempts:118},rw3:{makes:22,attempts:38},rc3:{makes:26,attempts:54}}},
  {id:'oct2025',date:'2025-10-01',zones:{
    clp:{makes:3,attempts:8},cp:{makes:11,attempts:26},paint_left:{makes:14,attempts:35},paint_right:{makes:9,attempts:29},
    left_mid:{makes:17,attempts:39},lcm:{makes:0,attempts:0},rcm:{makes:1,attempts:1},right_mid:{makes:15,attempts:27},
    lc3:{makes:6,attempts:19},lw3:{makes:15,attempts:21},ct3:{makes:14,attempts:38},rw3:{makes:10,attempts:20},rc3:{makes:4,attempts:20}}},
  {id:'nov2025',date:'2025-11-01',zones:{
    clp:{makes:4,attempts:4},cp:{makes:27,attempts:54},paint_left:{makes:14,attempts:40},paint_right:{makes:24,attempts:42},
    left_mid:{makes:34,attempts:75},lcm:{makes:5,attempts:11},rcm:{makes:1,attempts:2},right_mid:{makes:38,attempts:76},
    lc3:{makes:17,attempts:41},lw3:{makes:27,attempts:37},ct3:{makes:29,attempts:75},rw3:{makes:18,attempts:27},rc3:{makes:13,attempts:30}}},
  {id:'mar2026',date:'2026-03-01',zones:{
    clp:{makes:2,attempts:2},cp:{makes:5,attempts:10},paint_left:{makes:1,attempts:4},paint_right:{makes:6,attempts:9},
    left_mid:{makes:17,attempts:35},lcm:{makes:0,attempts:1},rcm:{makes:1,attempts:2},right_mid:{makes:18,attempts:38},
    lc3:{makes:6,attempts:10},lw3:{makes:12,attempts:20},ct3:{makes:4,attempts:18},rw3:{makes:10,attempts:19},rc3:{makes:1,attempts:1}}},
];

let D={sessions:[]},sha=null,pending={};
let cFilter='alltime',cOff=0,sFilter='alltime',sOff=0,av='court',mz=null;

async function load(){
  setSS('busy','Loading…');
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{headers:{Authorization:`token ${TOK}`,Accept:'application/vnd.github.v3+json'}});
    if(r.status===404){D={sessions:[...HIST]};setSS('ok','Seeding…');await push();renderAll();return;}
    if(!r.ok)throw r.status;
    const j=await r.json();sha=j.sha;
    D=JSON.parse(atob(j.content.replace(/\n/g,'')));
    setSS('ok','Synced');
  }catch(e){
    try{const lc=localStorage.getItem('st_d');D=lc?JSON.parse(lc):{sessions:[...HIST]};}catch(_){D={sessions:[...HIST]};}
    setSS('err','Offline');
  }
  renderAll();
}
async function push(){
  setSS('busy','Saving…');
  localStorage.setItem('st_d',JSON.stringify(D));
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(D,null,2))));
    const body={message:`shots ${new Date().toISOString().slice(0,10)}`,content,...(sha?{sha}:{})};
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{method:'PUT',headers:{Authorization:`token ${TOK}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw r.status;
    sha=(await r.json()).content.sha;setSS('ok','Saved ✓');
  }catch(e){setSS('err','Save failed');}
}
function setSS(s,l){document.getElementById('sd').className='sdot '+s;document.getElementById('sl').textContent=l;}

function getPeriod(f,o){if(f==='alltime')return'all';const n=new Date();if(f==='yearly')return String(n.getFullYear()+o);const d=new Date(n.getFullYear(),n.getMonth()+o,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getPeriodLbl(f,o){const k=getPeriod(f,o);if(k==='all')return'All Time';if(f==='yearly')return k;const[y,m]=k.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+y;}
function getSess(f,o){if(f==='alltime')return D.sessions;const k=getPeriod(f,o);return D.sessions.filter(s=>s.date.startsWith(k));}
function rollup(sessions){const r={};ZK.forEach(k=>r[k]={makes:0,attempts:0});sessions.forEach(s=>ZK.forEach(k=>{if(s.zones[k]){r[k].makes+=s.zones[k].makes;r[k].attempts+=s.zones[k].attempts;}}));return r;}

function zCol(m,a){if(!a)return'#555666';const p=m/a;if(p>=.70)return'#dc4010';if(p>=.60)return'#dd6030';if(p>=.50)return'#dea080';if(p>=.42)return'#5070a8';if(p>=.35)return'#3858a0';return'#1e3490';}
function zColBright(m,a){if(!a)return'var(--tdd)';const p=m/a;return p>=.50?'var(--or)':p>=.35?'var(--bl)':'var(--rd)';}
function pStr(m,a){return a?Math.round(m/a*100)+'%':'—';}
function e0(){const r={};ZK.forEach(k=>r[k]={makes:0,attempts:0});return r;}

// ── Court lines SVG ─────────────────────────────────────────
// ViewBox 600×400. Grid rows: 1.1+1.1+1.5+2=5.7fr → y=[0,77,154,259,400]
// Hoop at TOP (y≈18). 3PT arc at BOTTOM curving downward.
// Corner straight lines: x=100 and x=500, from y=0 (baseline/top) to y=259 (arc junction).
// 3PT arc: center(300,18), r=315 → from (100,259) curves down to (300,333) → (500,259).
//   Path: M 100,259 A 315,315 0 0,1 500,259  (short arc, CW sweep, bulges to y=333)
// FT circle: center(300,154), r=55.
//   Upper (inside paint, dashed): M 245,154 A 55,55 0 0,0 355,154
//   Lower (in mid-range, solid):  M 245,154 A 55,55 0 0,1 355,154
const OVERLAY=`<svg class="court-overlay" viewBox="0 0 600 400" preserveAspectRatio="none">
  <!-- 3PT arc curves UP from corners at y=140 to peak at y=69 -->
  <path d="M 100,140 A 316,316 0 0,1 500,140" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2"/>
  <!-- Corner 3 straight lines (y=0 top to y=140 arc junction) -->
  <line x1="100" y1="0" x2="100" y2="140" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
  <line x1="500" y1="0" x2="500" y2="140" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
  <!-- FT circle: center at row2/3 boundary y=245, r=56 -->
  <!-- Upper solid half (in mid-range) -->
  <path d="M 244,245 A 56,56 0 0,0 356,245" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
  <!-- Lower dashed half (in paint) -->
  <path d="M 244,245 A 56,56 0 0,1 356,245" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Paint box -->
  <rect x="200" y="245" width="200" height="155" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
  <!-- cp/clp divider -->
  <line x1="200" y1="322" x2="400" y2="322" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <!-- Restricted area -->
  <circle cx="300" cy="365" r="30" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Basket at bottom -->
  <circle cx="300" cy="382" r="13" fill="none" stroke="#f07030" stroke-width="2.5"/>
  <rect x="264" y="393" width="72" height="5" rx="1" fill="rgba(255,255,255,.2)"/>
</svg>`;

function buildChart(totals,isLog,wrapId){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  const zones=ZK.map(k=>{
    const{makes:m,attempts:a}=isLog?(pending[k]||{makes:0,attempts:0}):totals[k];
    const bg=isLog?(pending[k]?zCol(m,a):'#1c2234'):zCol(m,a);
    const ev=isLog?`onclick="tap('${k}')" ontouchend="tapT(event,'${k}')"`:''
    const inner=a?`<span class="zpct">${Math.round(m/a*100)}%</span><span class="zma">${m}/${a}</span>`:(isLog?`<span class="zplus">+</span>`:`<span class="zma" style="opacity:.25">—</span>`);
    return`<div class="z" data-k="${k}" ${ev} style="background:${bg}">${inner}</div>`;
  }).join('');
  wrap.innerHTML=`<div class="chart-grid">${zones}${OVERLAY}</div>`;
}

function renderCourt(){
  const ss=getSess(cFilter,cOff),t=rollup(ss);
  buildChart(t,false,'cWrap');
  document.getElementById('cplbl').textContent=getPeriodLbl(cFilter,cOff);
  document.getElementById('cnext').disabled=cOff>=0;
  document.getElementById('cpnav').style.display=cFilter==='alltime'?'none':'flex';
  buildSummary(t,'csum');
}
function renderLog(){
  buildChart(e0(),true,'lWrap');
  const keys=Object.keys(pending);
  document.getElementById('pend').style.display=keys.length?'block':'none';
  document.getElementById('lempty').style.display=keys.length?'none':'block';
  if(keys.length)document.getElementById('plist').innerHTML=keys.map(k=>{
    const z=ZS[k],{makes:m,attempts:a}=pending[k];
    return`<div class="pi"><div class="pin">${z.n}</div><div class="pis">${m}/${a}</div><div class="pip" style="color:${zColBright(m,a)}">${Math.round(m/a*100)}%</div><button class="pid" onclick="delP('${k}')">×</button></div>`;
  }).join('');
}
function renderStats(){
  const ss=getSess(sFilter,sOff),t=rollup(ss);
  document.getElementById('splbl').textContent=getPeriodLbl(sFilter,sOff);
  document.getElementById('snext').disabled=sOff>=0;
  document.getElementById('spnav').style.display=sFilter==='alltime'?'none':'flex';
  buildSummary(t,'ssum');
  const secs=[
    {label:'Paint (near hoop)', keys:['clp','cp','paint_left','paint_right']},
    {label:'Mid-Range',         keys:['left_mid','lcm','rcm','right_mid']},
    {label:'3-Point',           keys:['lc3','lw3','ct3','rw3','rc3']},
  ];
  document.getElementById('zlist').innerHTML=secs.map(s=>`<div class="slbl">${s.label}</div>`+s.keys.map(k=>{
    const z=ZS[k],{makes:m,attempts:a}=t[k],c=zColBright(m,a),ps=pStr(m,a);
    return`<div class="zr"><div class="zrc" style="background:${a?zCol(m,a):'var(--tdd)'}"></div><div class="zrn">${z.n}</div><div class="zrm">${a?m+'/'+a:'—'}</div><div class="zrp" style="color:${a?c:'var(--tdd)'}">${ps}</div><div class="zrt">${z.t}PT</div></div>`;
  }).join('')).join('');
  const recent=[...ss].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  let sh=`<div class="sst">${ss.length} Session${ss.length!==1?'s':''}</div>`;
  if(!recent.length)sh+='<p class="empty" style="padding:10px 0">No sessions yet.</p>';
  else recent.forEach(s=>{
    const m=ZK.reduce((a,k)=>a+(s.zones[k]?.makes||0),0),a=ZK.reduce((a,k)=>a+(s.zones[k]?.attempts||0),0),nz=Object.keys(s.zones).length;
    sh+=`<div class="si"><div><div class="sid">${fmtDate(s.date)}</div><div class="sis">${nz} zone${nz!==1?'s':''} · ${m}/${a} ${a?'('+Math.round(m/a*100)+'%)':''}</div></div><button class="sidel" onclick="delSess('${s.id}')">🗑</button></div>`;
  });
  document.getElementById('sesslist').innerHTML=sh;
}
function buildSummary(t,id){
  const tw=ZK.filter(k=>ZS[k].t==='2'),th=ZK.filter(k=>ZS[k].t==='3');
  const sum=keys=>keys.reduce((a,k)=>[a[0]+t[k].makes,a[1]+t[k].attempts],[0,0]);
  const[am,aa]=sum(ZK),[tm,ta]=sum(tw),[pm,pa]=sum(th);
  document.getElementById(id).innerHTML=`
    <div class="sc"><div class="scp">${pStr(am,aa)}</div><div class="scl">OVERALL</div><div class="scs">${aa?am+'/'+aa:'No shots'}</div></div>
    <div class="sc"><div class="scp" style="color:var(--bl)">${pStr(tm,ta)}</div><div class="scl">2-POINT</div><div class="scs">${ta?tm+'/'+ta:'—'}</div></div>
    <div class="sc"><div class="scp" style="color:var(--or)">${pStr(pm,pa)}</div><div class="scl">3-POINT</div><div class="scs">${pa?pm+'/'+pa:'—'}</div></div>`;
}
function fmtDate(ds){const d=new Date(ds+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function renderAll(){if(av==='court')renderCourt();else if(av==='log')renderLog();else if(av==='stats')renderStats();}

function sv(view){av=view;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('v-'+view).classList.add('active');document.getElementById('nb-'+view).classList.add('on');renderAll();}
function setF(f,btn,tid){document.querySelectorAll('#'+tid+' .tt').forEach(t=>t.classList.remove('on'));btn.classList.add('on');if(tid==='ct'){cFilter=f;cOff=0;renderCourt();}else{sFilter=f;sOff=0;renderStats();}document.getElementById(tid==='ct'?'cpnav':'spnav').style.display=f==='alltime'?'none':'flex';}
function chP(dir,w){if(w==='c'){cOff=Math.min(0,cOff+dir);renderCourt();}else{sOff=Math.min(0,sOff+dir);renderStats();}}

function tap(k){if(av==='log')openMo(k);}
function tapT(e,k){e.preventDefault();if(av==='log')openMo(k);}
function openMo(k){mz=k;const z=ZS[k],p=pending[k];document.getElementById('mtitle').textContent=z.n+' · '+z.t+'PT';document.getElementById('im').value=p?p.makes:'';document.getElementById('ia').value=p?p.attempts:'';document.getElementById('mo').classList.add('open');setTimeout(()=>document.getElementById('im').focus(),350);}
function closeMo(){document.getElementById('mo').classList.remove('open');mz=null;}
function addZone(){const m=parseInt(document.getElementById('im').value)||0,a=parseInt(document.getElementById('ia').value)||0;if(!a){closeMo();return;}if(m>a){document.getElementById('im').style.borderColor='var(--rd)';return;}pending[mz]={makes:m,attempts:a};closeMo();renderLog();}
document.getElementById('im').addEventListener('input',()=>{document.getElementById('im').style.borderColor='';});
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeMo();});

function delP(k){delete pending[k];renderLog();}
async function saveSess(){if(!Object.keys(pending).length)return;D.sessions.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),date:new Date().toISOString().slice(0,10),zones:{...pending}});pending={};renderLog();await push();renderAll();}
function delSess(id){if(!confirm('Delete this session?'))return;D.sessions=D.sessions.filter(s=>s.id!==id);push();renderStats();}

load();
</script>
</body>
</html>
